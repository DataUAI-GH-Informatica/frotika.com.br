name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Estilo, análise estática e testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Cache do Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependências PHP
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Preparar ambiente
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar e compilar front-end
        run: |
          npm ci
          npm run build

      - name: Pint (estilo)
        run: vendor/bin/pint --test

      - name: PHPStan (Larastan nível 6)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Testes (PHPUnit)
        run: composer test
